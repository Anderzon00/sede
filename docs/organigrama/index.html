<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organigrama Interactivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .viewer {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        .viewer.dragging {
            cursor: grabbing;
        }

        .viewer img {
            position: absolute;
            max-width: 95vw;
            max-height: 95vh;
            left: 50%;
            top: 20px;
            transform: translateX(-50%) scale(1);
            transform-origin: center top;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
            z-index: 100;
        }

        .btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #f0f0f0;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #00923F;
            color: white;
        }

        input[type=range] {
            width: 120px;
            height: 5px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00923F;
            border-radius: 50%;
            cursor: pointer;
        }

        .percent {
            background: #00923F;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .reset {
            background: transparent;
            border: 1px solid #00923F;
            color: #00923F;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset:hover {
            background: #00923F;
            color: white;
        }

        .hint {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,146,63,0.9);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="viewer" id="viewer">
        <img src="imagen.png" alt="Organigrama" id="img">
    </div>


    <div class="controls">
        <button class="btn" id="out">−</button>
        <input type="range" id="slider" min="0.5" max="3" step="0.1" value="1">
        <button class="btn" id="in">+</button>
        <span class="percent" id="percent">100%</span>
        <button class="reset" id="reset">⟲ Reset</button>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const img = document.getElementById('img');
        const slider = document.getElementById('slider');
        const percent = document.getElementById('percent');

        let scale = 1;
        let posX = 0;
        let posY = 0;
        let dragging = false;
        let startX, startY;

        // Actualizar imagen
        function update() {
            img.style.transform = `translateX(calc(-50% + ${posX}px)) translateY(${posY}px) scale(${scale})`;
            slider.value = scale;
            percent.textContent = Math.round(scale * 100) + '%';
        }

        // Zoom desde el centro
        function setZoom(val) {
            scale = Math.min(Math.max(val, 0.5), 3);
            update();
        }

        slider.oninput = e => setZoom(+e.target.value);
        document.getElementById('in').onclick = () => setZoom(scale + 0.2);
        document.getElementById('out').onclick = () => setZoom(scale - 0.2);
        
        document.getElementById('reset').onclick = () => { 
            scale = 1; 
            posX = 0;
            posY = 0; 
            update(); 
        };

        // Zoom con rueda - desde el centro
        viewer.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.15 : 0.15;
            setZoom(scale + delta);
        }, { passive: false });

        // Arrastrar
        viewer.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
            viewer.classList.add('dragging');
            e.preventDefault();
        });

        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            update();
        });

        document.addEventListener('mouseup', () => {
            if (dragging) {
                dragging = false;
                viewer.classList.remove('dragging');
            }
        });

        // Touch
        let startDist = 0;
        let startScaleTouch = 1;

        viewer.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                dragging = true;
                startX = e.touches[0].clientX - posX;
                startY = e.touches[0].clientY - posY;
            } else if (e.touches.length === 2) {
                dragging = false;
                startDist = Math.hypot(
                    e.touches[1].clientX - e.touches[0].clientX,
                    e.touches[1].clientY - e.touches[0].clientY
                );
                startScaleTouch = scale;
            }
        }, { passive: true });

        viewer.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && dragging) {
                posX = e.touches[0].clientX - startX;
                posY = e.touches[0].clientY - startY;
                update();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[1].clientX - e.touches[0].clientX,
                    e.touches[1].clientY - e.touches[0].clientY
                );
                setZoom(startScaleTouch * (dist / startDist));
            }
        }, { passive: false });

        viewer.addEventListener('touchend', e => {
            if (e.touches.length === 0) {
                dragging = false;
            }
        }, { passive: true });

        // Doble clic
        viewer.addEventListener('dblclick', () => setZoom(scale < 1.5 ? 2 : 1));
    </script>
</body>
</html>
