    // Helper para crear hotspots accesibles
    function addImageWithLabel(hotSpotDiv, args) {
      hotSpotDiv.classList.add('custom-image-hotspot');

      // Imagen
      const img = document.createElement('img');
      img.src = args.icon || 'pin.png';
      img.alt = ""; // Decorativo, el label tiene el texto
      img.width = 48; img.height = 48;
      hotSpotDiv.appendChild(img);

      // Etiqueta
      const label = document.createElement('div');
      label.className = 'hotspot-label';
      label.innerText = args.label || '';
      hotSpotDiv.appendChild(label);

      // Accesibilidad: Hacemos el div enfoccable y con rol
      hotSpotDiv.setAttribute('tabindex', '0');
      hotSpotDiv.setAttribute('role', 'button');
      hotSpotDiv.setAttribute('aria-label', `Ir a ${args.label || 'ubicación'}`);

      // Evento teclado para accesibilidad
      hotSpotDiv.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          // Simulamos clic si hay handler
          if (args.clickHandlerFunc) args.clickHandlerFunc();
        }
      });
    }

    let viewer;
    let tourStarted = false;
    const historyStack = [];
    let isGoingBack = false;

    // Inicializar visor
    viewer = pannellum.viewer('panorama', config);

    // Evento cuando carga una escena
    viewer.on('scenechange', (sceneId) => {
      showSceneTitle(sceneId);
      announceScene(sceneId);
      setMenuActive(sceneId);
    });

    // Funciones de control

    function showSceneTitle(sceneId) {
      const titleEl = document.getElementById('sceneTitle');
      const sceneConfig = config.scenes[sceneId];
      if (sceneConfig && titleEl) {
        titleEl.textContent = sceneConfig.title || sceneId;
        titleEl.classList.add('visible');
        setTimeout(() => titleEl.classList.remove('visible'), 3000);
      }
    }

    function announceScene(sceneId) {
      const announcer = document.getElementById('srAnnouncer');
      const sceneConfig = config.scenes[sceneId];
      if (sceneConfig) {
        announcer.textContent = `Has entrado a ${sceneConfig.title}`;
      }
    }

    function updateBottomButtons() {
      const homeBtn = document.getElementById('btnHome');
      const backBtn = document.getElementById('btnBack');
      // Mostrar u ocultar basado en historial
      if (backBtn) backBtn.style.visibility = historyStack.length > 1 ? 'visible' : 'hidden';
      if (homeBtn) homeBtn.style.visibility = historyStack.length > 0 ? 'visible' : 'hidden';
    }

    function setMenuActive(sceneId) {
      document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
      const active = document.querySelector(`.scene-btn[data-scene="${sceneId}"]`);
      if (active) active.classList.add('active');
    }

    function ensureTourStarted(startScene) {
      if (tourStarted) return;
      tourStarted = true;
      document.getElementById('welcome').style.display = 'none';
      document.body.classList.remove('welcome-visible');
      historyStack.length = 0;
      historyStack.push(startScene);
      updateBottomButtons();
    }

    function load(sceneId) {
      ensureTourStarted(sceneId);

      // Lógica de historial
      if (!isGoingBack) {
        const last = historyStack[historyStack.length - 1];
        if (last !== sceneId) historyStack.push(sceneId);
      }

      viewer.loadScene(sceneId);
      updateBottomButtons();
    }

    function enterTour(startScene) {
      load(startScene);
    }

    function goBack() {
      if (historyStack.length <= 1) return;
      isGoingBack = true;
      historyStack.pop();
      const prev = historyStack[historyStack.length - 1];
      if (prev) viewer.loadScene(prev);
      updateBottomButtons();
      isGoingBack = false;
    }

    function goHome() {
      // Resetear todo
      const w = document.getElementById('welcome');
      if (w) w.style.display = 'grid';
      document.body.classList.add('welcome-visible');
      tourStarted = false;
      historyStack.length = 0;
      // Opcional: resetear visor a inicio
      viewer.loadScene('entrada');
      updateBottomButtons();
    }

    function jumpFromMenu(sceneId) {
      // Cerrar menú
      const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('nav'));
      if (offcanvas) offcanvas.hide();

      // Añadir actual al historial antes de saltar
      if (viewer && typeof viewer.getScene === 'function') {
        const current = viewer.getScene();
        if (current && historyStack[historyStack.length - 1] !== current) {
          historyStack.push(current);
        }
      }
      load(sceneId);
    }

    // Funciones Pro
    function toggleRotation() {
      const curr = viewer.getConfig();
      if (curr.autoRotate) {
        viewer.stopAutoRotate();
        document.getElementById('btnRotate').classList.remove('active');
      } else {
        viewer.startAutoRotate(2); // Velocidad
        document.getElementById('btnRotate').classList.add('active');
      }
    }

    function toggleFullscreen() {
      const elem = document.documentElement;
      if (!document.fullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    }

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.altKey && e.key === 'h') goHome();
      if (e.altKey && e.key === 'b') goBack();
    });

     



  </script>
</body>
